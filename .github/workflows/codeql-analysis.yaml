# Reusable workflow to run CodeQL analysis of codebase for specified language,
# and send job status notification to Slack

name: codeql-analysis

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string

jobs:
  codeql-analysis:
    name: CodeQL analysis for ${{ inputs.language }}
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6  # zizmor: ignore[unpinned-uses]
        with:
          persist-credentials: false  # Required to avoid exposing secrets to CodeQL analysis of forked PRs

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4  # zizmor: ignore[unpinned-uses]
        with:
          languages: ${{ inputs.language }}

      - name: Perform CodeQL Analysis
        # Ignore the zizmor excessive-permissions warning because this is in a reusable workflow
        # and the permissions required to run the analysis depend on the context of the caller workflow
        uses: github/codeql-action/analyze@v4  # zizmor: ignore[unpinned-uses, excessive-permissions]
