# Reusable workflow to run CodeQL analysis of codebase for specified language,
# and send job status notification to Slack

name: codeql-analysis

permissions: {}

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string

jobs:
  codeql-analysis:
    name: CodeQL analysis for ${{ inputs.language }}
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6  # zizmor: ignore[unpinned-uses]
        with:
          persist-credentials: true  # Required to allow CodeQL action to checkout code and upload analysis results in forked PRs

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4  # zizmor: ignore[unpinned-uses]
        with:
          languages: ${{ inputs.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4  # zizmor: ignore[unpinned-uses]
