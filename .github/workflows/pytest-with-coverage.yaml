# Reusable workflow to do repo checkout, build env, run pytest w/ coverage,
# upload coverage report to Codecov, and send job status notification to Slack

name: pytest-with-coverage

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      conda-env-file:
        required: true
        type: string
      conda-env-name:
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        required: true

jobs:
  pytest-with-coverage:
    name: pytest with coverage in ${{ inputs.conda-env-name }} environment
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7  # zizmor: ignore[unpinned-uses]
        with:
          persist-credentials: false  # Required to avoid exposing secrets to pytest run in forked PRs

      - name: Get current date for downloads cache key
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> "${GITHUB_OUTPUT}"

      - name: Set up Conda environment with Micromamba
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476
        with:
           environment-file: ${{ inputs.conda-env-file }}
           environment-name: ${{ inputs.conda-env-name }}
           # environment caching does not play nicely with --editable installed packages
           cache-environment: false
           cache-downloads: true
           # persist downloads cache for 1 day
           cache-downloads-key: downloads-${{ steps.date.outputs.date }}-pytest
           create-args: >-
             python=${{ inputs.python-version }}

      - name: pytest package with coverage
        shell: bash -l {0}
        run: |
          pytest --cov=$GITHUB_WORKSPACE --cov-report=xml

      - name: Upload coverage report to Codecov
        # Ignore the zizmor excessive-permissions warning because this is in a reusable workflow
        # and the permissions required to run the action depend on the context of the caller workflow
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # zizmor: ignore[excessive-permissions]
        with:
          files: ./coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
