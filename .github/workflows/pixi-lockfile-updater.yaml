# Reusable workflow to run pixi-diff-to-markdown and create a PR with the updated lockfile.

name: pixi-lockfile-updater

on:
  workflow_call:
    # No inputs or secrets needed for this workflow, but we still need to specify
    # the on.workflow_call trigger to make this a reusable workflow.

jobs:
  pixi-update:
    name: Update pixi lockfile and create pull request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7  # zizmor: ignore[unpinned-uses]
        with:
          persist-credentials: false  # Required to avoid exposing secrets to the lockfile update process in forked PRs

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f
        with:
          run-install: false

      - name: Update lockfile
        run: |
          set -o pipefail
          pixi global install pixi-diff-to-markdown
          pixi update --json | pixi exec pixi diff-to-markdown >> diff.md

      - name: Create pull request
        # Ignore the zizmor excessive-permissions warning because this is in a reusable workflow
        # and the permissions required to run the action depend on the context of the caller workflow.
        # Also ignore the superfluous-actions warning because the Pixi developers recommend this configuration,
        # and replacing it with a direct calls to the GitHub API would add unnecessary complexity.
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # zizmor: ignore[excessive-permissions, superfluous-actions]
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Update pixi lockfile
          title: Update pixi lockfile
          body-path: diff.md
          branch: update-pixi
          base: main
          labels: pixi
          delete-branch: true
          add-paths: pixi.lock
