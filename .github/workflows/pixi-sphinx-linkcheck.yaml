# Reusable workflow to run Sphinx linkcheck on docs via Pixi

name: pixi-sphinx-linkcheck

on:
  workflow_call:

jobs:
  sphinx-linkcheck:
    runs-on: 'ubuntu-latest'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0
        with:
          cache: true

      - name: linkcheck docs
        run: pixi run linkcheck
