# Reusable workflow to run Sphinx linkcheck on docs via Pixi

name: pixi-sphinx-linkcheck

permissions: {}

on:
  workflow_call:

jobs:
  sphinx-linkcheck:
    runs-on: 'ubuntu-latest'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11
        with:
          cache: true

      - name: linkcheck docs
        run: pixi run linkcheck
