[workspace]
authors = ["Doug Latornell <dlatornell@eoas.ubc.ca>"]
channels = ["conda-forge"]
name = "gha-workflows"
platforms = ["linux-64"]
version = "25.1.dev0"

[tasks]
check = { cmd = "python gha_workflows_checker.py", cwd = "gha_workflow_checker" }
update-reqs = "python -m pip list --format=freeze >> requirements.txt"

[dependencies]
gh = ">=2.92.0,<3"
pip = ">=26.1.1,<27"
python = "3.14.*"
pyyaml = ">=6.0.3,<7"
rich = ">=15.0.0,<16"

# For code style & repo QA
black = ">=26.1.0,<27"
pre-commit = ">=4.6.0,<5"
